  <rect x="1.5" y="1.5" width="61" height="61" rx="16" fill="url(#cr-favicon-bg)" />
  <rect x="1.5" y="1.5" width="61" height="61" rx="16" fill="none" stroke="#ffffff10" stroke-width="1" />
  <circle cx="32" cy="28" r="22" fill="url(#cr-favicon-glow)" />
  <polyline points="23,20 12,32 23,44" fill="none" stroke="url(#cr-favicon-stroke)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
  <polyline points="41,20 52,32 41,44" fill="none" stroke="url(#cr-favicon-stroke)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
  <polyline points="27.5,33 31,37 37,27" fill="none" stroke="url(#cr-favicon-stroke)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
