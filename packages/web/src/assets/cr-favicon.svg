<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="cr-favicon-title">
  <title id="cr-favicon-title">CR favicon</title>
  <defs>
    <linearGradient id="cr-favicon-bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <radialGradient id="cr-favicon-glow" cx="32" cy="28" r="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.16" />
      <stop offset="1" stop-color="#7dd3fc" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="cr-favicon-stroke" x1="10" y1="18" x2="54" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bae6fd" />
      <stop offset="0.5" stop-color="#7dd3fc" />
      <stop offset="1" stop-color="#3b82f6" />
    </linearGradient>
