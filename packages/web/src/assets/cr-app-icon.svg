  <circle cx="32" cy="28" r="22" fill="url(#cr-app-icon-glow)" />
  <polyline points="23,20 12,32 23,44" fill="none" stroke="url(#cr-app-icon-stroke)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <polyline points="41,20 52,32 41,44" fill="none" stroke="url(#cr-app-icon-stroke)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <polyline points="27.5,33 31,37 37,27" fill="none" stroke="url(#cr-app-icon-stroke)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
