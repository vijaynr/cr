<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="cr-app-icon-title">
  <title id="cr-app-icon-title">CR app icon</title>
  <defs>
    <linearGradient id="cr-app-icon-bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="1" stop-color="#050816" />
    </linearGradient>
    <radialGradient id="cr-app-icon-glow" cx="32" cy="28" r="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.14" />
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="cr-app-icon-stroke" x1="10" y1="18" x2="54" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc" />
